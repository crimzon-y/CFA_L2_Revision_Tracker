<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #a0a0a0;
    --text3: #606060;
    --green: #1D9E75;
    --green-bg: rgba(29,158,117,0.12);
    --blue: #378ADD;
    --blue-bg: rgba(55,138,221,0.12);
    --amber: #EF9F27;
    --amber-bg: rgba(239,159,39,0.12);
    --radius: 8px;
    --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; }

  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }

  /* HEADER */
  .header { margin-bottom: 28px; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .sync-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); margin-top: 8px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
  .sync-dot.live { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* TABS */
  .tabs { display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 0.5px solid var(--border); }
  .tab { font-size: 13px; padding: 8px 16px; cursor: pointer; color: var(--text2); border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; color: var(--text2); transition: color 0.15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text); }

  .section { display: none; }
  .section.active { display: block; }

  /* METRIC CARDS */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px; border: 0.5px solid var(--border); }
  .metric-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .metric-value { font-size: 26px; font-weight: 500; color: var(--text); line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* PROGRESS BAR */
  .progress-wrap { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 16px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 500; margin-bottom: 10px; }
  .bar-track { height: 5px; background: var(--border2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.5s ease; }

  /* SUBJECT ROWS */
  .subjects { display: flex; flex-direction: column; gap: 6px; }
  .subject-row { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
  .s-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .s-name { font-size: 13px; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .s-count { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .s-bar { width: 72px; height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
  .s-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .s-pct { font-size: 11px; color: var(--text2); width: 30px; text-align: right; }

  /* LEGEND */
  .legend { display: flex; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
  .l-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); }
  .l-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* DAY CARDS */
  .days { display: flex; flex-direction: column; gap: 6px; }
  .day-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.2s; }
  .day-card.open { border-color: var(--border2); }
  .day-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .day-num { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; width: 42px; flex-shrink: 0; }
  .day-meta { flex: 1; min-width: 0; }
  .day-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .day-date { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .day-dots { display: flex; gap: 3px; align-items: center; }
  .dd { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); transition: background 0.2s; }
  .dd.r-done { background: var(--green); }
  .dd.q-done { background: var(--blue); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); flex-shrink: 0; transition: background 0.2s; }
  .status-dot.partial { background: var(--amber); }
  .status-dot.done { background: var(--green); }
  .chevron { color: var(--text3); font-size: 14px; transition: transform 0.2s; flex-shrink: 0; }
  .chevron.open { transform: rotate(180deg); }

  .day-body { display: none; padding: 0 16px 14px; border-top: 0.5px solid var(--border); }
  .day-body.open { display: block; }

  /* SLOTS */
  .slot { display: flex; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .slot:last-child { border-bottom: none; }
  .slot-time { font-size: 10px; color: var(--text3); width: 86px; flex-shrink: 0; padding-top: 2px; line-height: 1.4; }
  .slot-inner { flex: 1; }
  .slot-title { font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .chip-gym { background: var(--blue-bg); color: var(--blue); }
  .chip-break { background: var(--bg3); color: var(--text3); }
  .chip-flex { background: var(--green-bg); color: var(--green); }

  /* CHECKBOXES */
  .check-row { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0; }
  .check-box { width: 15px; height: 15px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .check-box.checked { background: var(--green); border-color: var(--green); }
  .check-box.checked::after { content: ''; width: 5px; height: 3px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translateY(-1px); display: block; }
  .check-circle { width: 15px; height: 15px; border-radius: 50%; border: 1px solid var(--border2); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .check-circle.checked { background: var(--blue); border-color: var(--blue); }
  .check-circle.checked::after { content: ''; width: 5px; height: 3px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translateY(-1px); display: block; }
  .check-label { font-size: 12px; color: var(--text); cursor: pointer; line-height: 1.4; }
  .check-label.done { color: var(--text3); text-decoration: line-through; }
  .r-accent { border-left: 2px solid #444; padding-left: 6px; }

  /* NOTES */
  .note-row { padding-top: 8px; }
  .note-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  textarea { width: 100%; font-size: 12px; padding: 8px 10px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg3); color: var(--text); resize: none; min-height: 44px; font-family: inherit; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--border2); }
  textarea::placeholder { color: var(--text3); }

  /* READINGS TAB */
  .readings-subject { margin-bottom: 18px; }
  .rs-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 0.5px solid var(--border); }
  .rs-name { font-size: 13px; font-weight: 500; color: var(--text); }

  /* TOAST */
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 10px 16px; font-size: 12px; color: var(--text2); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }

  @media(max-width:520px) {
    .metrics { grid-template-columns: repeat(2,1fr); }
    .s-bar { display: none; }
  }
</style>

  {day:2,date:'Tue 9 Jun',label:'Quant Methods II',readings:['R5','R6'],quiz:null},

  {day:20,date:'Sat 27 Jun',label:'Final mock review + consolidation',readings:[],quiz:null},
];

let STATE = {checked:{}, quizChecked:{}, notes:{}};

// ===== FIREBASE SYNC =====
function loadFromFirebase() {
  if (!db) {
    loadFromLocalStorage();
    return;
  }
  
  db.ref('planner').on('value', (snapshot) => {
    if (snapshot.exists()) {
      STATE = snapshot.val();
      renderAll();
    }
  }, (error) => {
    console.error('Firebase read error:', error);
    loadFromLocalStorage();
    setSyncStatus(false, 'Firebase error — using local storage');
  });
}

function saveToFirebase(key, value) {
  if (!db) {
    saveToLocalStorage();
    return;
  }
  
  db.ref('planner/' + key).set(value).catch(err => {
    console.error('Firebase write error:', err);
    saveToLocalStorage();
  });
}

function loadFromLocalStorage() {
  try {
    const ls = localStorage.getItem('cfa_l2_planner_state');
    if (ls) STATE = JSON.parse(ls);
  } catch(e) {}
  renderAll();
}

function saveToLocalStorage() {
  try {
    localStorage.setItem('cfa_l2_planner_state', JSON.stringify(STATE));
  } catch(e) {}
}

// ===== STATE FUNCTIONS =====
function countChecked() { return Object.values(STATE.checked).filter(Boolean).length; }
function countQuizzes() { return Object.values(STATE.quizChecked).filter(Boolean).length; }

// ===== RENDER =====
function renderOverview() {
  const done = countChecked();
  const total = 43;
  const qDone = countQuizzes();
  const pct = Math.round(done/total*100);

  const start = new Date('2026-06-08');
  const end = new Date('2026-06-27');
  const now = new Date();
  const left = Math.max(0, Math.ceil((end - now) / 86400000));

  let html = `
  <div class="metrics">
    <div class="metric"><div class="metric-label">Days left</div><div class="metric-value">${left}</div><div class="metric-sub">of 20 total</div></div>
    <div class="metric"><div class="metric-label">Readings done</div><div class="metric-value">${done}</div><div class="metric-sub">of 43</div></div>
    <div class="metric"><div class="metric-label">Quizzes done</div><div class="metric-value">${qDone}</div><div class="metric-sub">of 10</div></div>
    <div class="metric"><div class="metric-label">Overall</div><div class="metric-value">${pct}%</div><div class="metric-sub">completion</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span>Total progress</span><span>${pct}%</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="subjects">`;

  SUBJECTS.forEach(s => {
    const t = s.readings.length;
    const d = s.readings.filter(r=>STATE.checked[r.id]).length;
    const p = t > 0 ? Math.round(d/t*100) : 0;
    html += `<div class="subject-row">
      <div class="s-dot" style="background:${s.color}"></div>
      <div class="s-name">${s.name}</div>
      <div class="s-count">${d}/${t}</div>
      <div class="s-bar"><div class="s-bar-fill" style="width:${p}%;background:${s.color}"></div></div>
      <div class="s-pct">${p}%</div>
    </div>`;
  });

  html += `</div>
  <div class="legend">
    <div class="l-item"><div class="l-dot" style="background:#1D9E75"></div>Reading done</div>
    <div class="l-item"><div class="l-dot" style="background:#378ADD"></div>Quiz done</div>
    <div class="l-item"><div class="l-dot" style="background:#EF9F27"></div>In progress</div>
  </div>`;

  document.getElementById('tab-overview').innerHTML = html;
}

function renderSchedule() {
  let html = `<p style="font-size:12px;color:#606060;margin-bottom:14px">Click any day to expand. Check off readings and quizzes — updates live for your dad too.</p><div class="days">`;

  DAYS.forEach((day, idx) => {
    const rDone = day.readings.filter(r=>STATE.checked[r]).length;
    const qDone = day.quiz && STATE.quizChecked[day.quiz];
    const total = day.readings.length + (day.quiz?1:0);
    const done = rDone + (qDone?1:0);
    const statusClass = total===0 ? '' : done===total ? 'done' : done>0 ? 'partial' : '';

    const dots = day.readings.map(r=>`<div class="dd${STATE.checked[r]?' r-done':''}"></div>`).join('')

    const half = Math.ceil(day.readings.length/2);
    const slot1R = day.readings.slice(0, half);
    const slot2R = day.readings.slice(half);

    html += `<div class="day-card" id="dc-${idx}">
      <div class="day-header" onclick="toggleDay(${idx})">
        <span class="day-num">Day ${day.day}</span>
        <div class="day-meta">

          <div class="day-date">${day.date}</div>
        </div>
        <div class="status-dot ${statusClass}" id="sd-${idx}"></div>
        <div class="chevron" id="chev-${idx}">▾</div>
      </div>
      <div class="day-body" id="db-${idx}">

        <div class="slot">
          <span class="slot-time">7:00–8:00 am</span>
          <div class="slot-inner"><span class="chip chip-gym">🏋 Gym (1 hr)</span></div>
        </div>

        <div class="slot">
          <span class="slot-time">8:15–11:15 am</span>
          <div class="slot-inner">
            <div class="slot-title">Slot 1 — Study (3 hrs, 10-min break per hour)</div>
            ${slot1R.length ? slot1R.map(rid=>checkRow(rid,idx)).join('') : `<span style="font-size:12px;color:#606060">Continue from previous / deep review</span>`}
          </div>
        </div>

        <div class="slot">
          <span class="slot-time">11:15 am–12:30 pm</span>
          <div class="slot-inner"><span class="chip chip-break">Lunch break — 75 min</span></div>
        </div>

        <div class="slot">
          <span class="slot-time">12:30–3:30 pm</span>
          <div class="slot-inner">
            <div class="slot-title">Slot 2 — Study (3 hrs, 10-min break per hour)</div>
            ${slot2R.length ? slot2R.map(rid=>checkRow(rid,idx)).join('') : `<span style="font-size:12px;color:#606060">Consolidate + note-making</span>`}
          </div>
        </div>

        <div class="slot">
          <span class="slot-time">3:30–4:00 pm</span>
          <div class="slot-inner"><span class="chip chip-break">Short break — 30 min</span></div>
        </div>

        <div class="slot">
          <span class="slot-time">4:00–6:00 pm</span>
          <div class="slot-inner">
            <div class="slot-title">Slot 3 — Flex (2 hrs)</div>
            <span class="chip chip-flex">Quiz analysis · backlog · next-day prep</span>
            ${day.quiz ? `<div style="margin-top:8px">${quizRow(day.quiz, idx)}</div>` : ''}
          </div>
        </div>

        <div class="slot note-row">
          <span class="slot-time" style="padding-top:8px">Notes</span>
          <div class="slot-inner">
            <textarea id="note-${idx}" placeholder="Score, observations, topics to revisit…" onblur="saveNote(${idx},this.value)">${STATE.notes[idx]||''}</textarea>
          </div>
        </div>

      </div>
    </div>`;
  });

  html += `</div>`;
  document.getElementById('tab-schedule').innerHTML = html;
}

function checkRow(rid, dayIdx) {
  const r = R_MAP[rid];
  if (!r) return '';
  const done = STATE.checked[rid];
  return `<div class="check-row">
    <div class="check-box${done?' checked':''}" id="cb-${rid}" onclick="toggleReading('${rid}')"></div>
    <span class="check-label${done?' done':''} r-accent" id="cl-${rid}" style="border-left-color:${r.color}" onclick="toggleReading('${rid}')">${rid} · ${r.title}</span>
  </div>`;
}

function quizRow(subject, dayIdx) {
  const done = STATE.quizChecked[subject];
  const esc = subject.replace(/'/g,"\\'");
  return `<div class="check-row">
    <div class="check-circle${done?' checked':''}" id="qc-${safeId(subject)}" onclick="toggleQuiz('${esc}')"></div>
    <span class="check-label${done?' done':''}" id="ql-${safeId(subject)}" onclick="toggleQuiz('${esc}')">Manish Ramuka quiz: ${subject}</span>
  </div>`;
}

function safeId(s) { return s.replace(/[^a-z0-9]/gi,'_'); }

function renderReadings() {
  let html = `<p style="font-size:12px;color:#606060;margin-bottom:16px">All 43 Schweser readings. Check off from here or from the day-by-day view — synced live.</p>`;
  SUBJECTS.forEach(s => {
    html += `<div class="readings-subject">
      <div class="rs-header">
        <div class="s-dot" style="background:${s.color}"></div>
        <div class="rs-name">${s.name}</div>
      </div>`;
    s.readings.forEach(r => {
      const done = STATE.checked[r.id];
      html += `<div class="check-row" style="padding:5px 0">
        <div class="check-box${done?' checked':''}" id="rlcb-${r.id}" onclick="toggleReading('${r.id}')"></div>
        <span class="check-label${done?' done':''} r-accent" id="rlcl-${r.id}" style="border-left-color:${s.color}" onclick="toggleReading('${r.id}')">${r.id} · ${r.title}</span>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('tab-readings').innerHTML = html;
}

function renderAll() {
  renderOverview();
  renderSchedule();
  renderReadings();
}

// ===== INTERACTIONS =====
function toggleDay(idx) {
  const body = document.getElementById(`db-${idx}`);
  const chev = document.getElementById(`chev-${idx}`);
  const card = document.getElementById(`dc-${idx}`);
  const open = !body.classList.contains('open');
  body.classList.toggle('open', open);
  chev.classList.toggle('open', open);
  card.classList.toggle('open', open);
}

function toggleReading(rid) {
  STATE.checked[rid] = !STATE.checked[rid];
  saveToFirebase('checked', STATE.checked);
  saveToLocalStorage();
  renderAll();
  showToast(STATE.checked[rid] ? `${rid} done ✓` : `${rid} unmarked`);
}

function toggleQuiz(subject) {
  STATE.quizChecked[subject] = !STATE.quizChecked[subject];
  saveToFirebase('quizChecked', STATE.quizChecked);
  saveToLocalStorage();
  renderAll();
  showToast(STATE.quizChecked[subject] ? `${subject} ✓` : `Quiz unmarked`);
}

function saveNote(idx, val) {
  STATE.notes[idx] = val;
  saveToFirebase('notes', STATE.notes);
  saveToLocalStorage();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function setSyncStatus(ok, msg) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if (ok) {
    dot.className = 'sync-dot live';
    lbl.textContent = msg || 'Live sync — your dad sees updates instantly';
  } else {
    dot.className = 'sync-dot';
    lbl.textContent = msg || 'Offline mode';
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2000);
}

// ===== INIT =====
loadFromFirebase();
</script>
</body>
</html>
